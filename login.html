<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Instinct Edu</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1b;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .registro-card {
            background: #242424;
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
            margin-bottom: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
        }

        .form-group input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a1b;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        .btn-registro {
            width: 100%;
            padding: 12px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-registro:hover {
            background: #e84118;
            transform: translateY(-2px);
        }

        #campoAsignatura {
            display: none;
        }
    </style>
</head>

<body>

    <div class="registro-card">
        <div class="logo">Instinct Edu</div>
        <h2 style="font-weight: 400; color: #ccc;">Crear Cuenta</h2>

        <form id="formRegistro">

            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="regNombre" placeholder="Tu nombre y apellido" required>
            </div>

            <div class="form-group">
                <label>¿Quién eres?</label>
                <select id="regRol" onchange="verificarRol()">
                    <option value="estudiante">Estudiante</option>
                    <option value="maestro">Maestro / Profesor</option>
                </select>
            </div>

            <div id="campoAsignatura" class="form-group">
                <label>Asignatura que imparte</label>
                <input type="text" id="regMateria" placeholder="Ej: Matemáticas, Historia...">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="regPass" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-registro">Registrarse</button>

        </form>
    </div>

    <script>
        // Mostrar/Ocultar el campo de materia según el rol
        function verificarRol() {
            const rol = document.getElementById('regRol').value;
            const campo = document.getElementById('campoAsignatura');
            campo.style.display = (rol === "maestro") ? "block" : "none";
        }

        document.getElementById('formRegistro').addEventListener('submit', function(e) {
            e.preventDefault();

            const rol = document.getElementById('regRol').value;
            const materia = document.getElementById('regMateria').value;

            // Guardar los datos del usuario
            const datosUsuario = {
                nombre: document.getElementById('regNombre').value,
                rol: rol,
                asignatura: (rol === "maestro") ? materia : null,
                pass: document.getElementById('regPass').value
            };

            // Guardar en localStorage
            localStorage.setItem('usuarioRegistrado', JSON.stringify(datosUsuario));

            alert('✅ Registro exitoso como ' + rol);
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
