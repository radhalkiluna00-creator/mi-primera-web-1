<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas | Instinct Edu</title>
    
    <style>
        /* CONFIGURACIÓN VISUAL DASHBOARD */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #1a1a1b; color: white;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        .dashboard-container { display: flex; height: 100vh; }

        .sidebar {
            width: 280px; background-color: #121212; padding: 25px;
            border-right: 1px solid #333; display: flex; flex-direction: column;
            box-sizing: border-box;
        }

        .logo { font-size: 22px; font-weight: bold; color: #ff4757; margin-bottom: 30px; }

        /* PANEL EXCLUSIVO PARA MAESTROS */
        #seccionMaestro {
            display: none; background: #242424; padding: 15px;
            border-radius: 12px; margin-bottom: 20px; border: 1px solid #ff4757;
        }

        #seccionMaestro h4 { margin: 0 0 10px 0; color: #ff4757; font-size: 14px; text-transform: uppercase; }

        .form-maestro label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }

        .form-maestro input {
            width: 100%; padding: 10px; margin-bottom: 10px;
            background: #1a1a1b; border: 1px solid #444; color: white; border-radius: 6px;
            box-sizing: border-box; outline: none;
        }

        .form-maestro input:disabled { background: #000; color: #666; border: 1px solid #222; }

        .btn-publicar {
            width: 100%; padding: 10px; background: #ff4757;
            color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
            transition: 0.3s;
        }

        .btn-publicar:hover { background: #ff6b81; }

        /* BUSCADOR INDIVIDUAL */
        #contenedorBuscador {
            margin-bottom: 20px;
            display: none; /* Se activa solo para estudiantes */
        }

        .input-busqueda {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333;
            background: #242424; color: white; outline: none; box-sizing: border-box;
            font-size: 14px;
        }

        .input-busqueda:focus { border-color: #ff4757; }

        /* CONTENIDO PRINCIPAL */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }

        .card { background: #242424; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        table { width: 100%; border-collapse: collapse; }
        th { color: #666; text-align: left; padding: 15px; border-bottom: 2px solid #333; font-size: 12px; text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid #333; font-size: 15px; }

        .aprobado { color: #4cd137; font-weight: bold; }
        .reprobado { color: #ff4757; font-weight: bold; }
        
        .footer-sidebar { margin-top: auto; padding-top: 20px; border-top: 1px solid #333; }
        .rol-tag { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 4px; color: #ff4757; margin-top: 5px; display: inline-block; }
        
        .btn-logout { background: none; border: 1px solid #444; color: #666; padding: 8px; cursor: pointer; margin-top: 15px; border-radius: 6px; width: 100%; font-size: 12px; }
        .btn-logout:hover { color: white; border-color: white; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">Instinct Edu</div>
            
            <div id="seccionMaestro">
                <h4>👨‍🏫 Panel Docente</h4>
                <div class="form-maestro">
                    <label>Asignatura:</label>
                    <input type="text" id="materiaNombre" disabled>
                    
                    <label>Nota del Estudiante:</label>
                    <input type="number" id="materiaNota" placeholder="0-100">
                    
                    <button class="btn-publicar" onclick="guardarNuevaNota()">Publicar</button>
                </div>
            </div>

            <nav>
                <ul style="list-style: none; padding: 0;">
                    <li><a href="#" style="color: white; text-decoration: none; font-size: 14px;">📊 Mis Calificaciones</a></li>
                </ul>
            </nav>

            <div class="footer-sidebar">
                <p id="nombreUser" style="font-size: 14px; margin: 0;">👤 Usuario</p>
                <div id="rolTag" class="rol-tag">CARGANDO...</div>
                <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
            </div>
        </aside>

        <main class="main-content">
            <h1 style="margin-bottom: 10px;">Boletín Académico</h1>
            <p style="color: #666; margin-bottom: 30px;">Consulta tus notas individuales y estados de asignatura.</p>

            <div id="contenedorBuscador">
                <input type="text" id="inputBusqueda" class="input-busqueda" placeholder="🔍 Buscar asignatura específica (Ej: Matemáticas)..." oninput="filtrarNotas()">
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Asignatura</th>
                            <th>Nota</th>
                            <th>Estado</th>
                            <th>Profesor</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const usuario = JSON.parse(localStorage.getItem('usuarioRegistrado'));
            
            if (!usuario) {
                window.location.href = "registro.html";
                return;
            }

            document.getElementById('nombreUser').innerText = "👤 " + usuario.nombre;
            
            // CONFIGURAR VISTA POR ROL
            if (usuario.rol === "maestro") {
                document.getElementById('seccionMaestro').style.display = "block";
                document.getElementById('rolTag').innerText = "MAESTRO";
                document.getElementById('materiaNombre').value = usuario.asignatura;
                document.getElementById('contenedorBuscador').style.display = "none";
            } else {
                document.getElementById('rolTag').innerText = "ESTUDIANTE";
                document.getElementById('contenedorBuscador').style.display = "block";
            }

            dibujarTabla();
        });

        function guardarNuevaNota() {
            const usuario = JSON.parse(localStorage.getItem('usuarioRegistrado'));
            const nota = document.getElementById('materiaNota').value;

            if (nota === "" || nota < 0 || nota > 100) {
                alert("Ingresa una nota válida");
                return;
            }

            let notasSistema = JSON.parse(localStorage.getItem('notasSistema')) || [];
            const index = notasSistema.findIndex(n => n.materia === usuario.asignatura);
            
            if (index !== -1) {
                notasSistema[index].nota = parseInt(nota);
            } else {
                notasSistema.push({ 
                    materia: usuario.asignatura, 
                    nota: parseInt(nota),
                    maestro: usuario.nombre 
                });
            }

            localStorage.setItem('notasSistema', JSON.stringify(notasSistema));
            document.getElementById('materiaNota').value = "";
            alert("Nota actualizada correctamente");
            dibujarTabla();
        }

        function filtrarNotas() {
            const busqueda = document.getElementById('inputBusqueda').value.toLowerCase();
            dibujarTabla(busqueda);
        }

        function dibujarTabla(filtro = "") {
            const tabla = document.getElementById('tabla-cuerpo');
            const notas = JSON.parse(localStorage.getItem('notasSistema')) || [];
            
            tabla.innerHTML = "";

            const notasFiltradas = notas.filter(n => n.materia.toLowerCase().includes(filtro));

            if (notasFiltradas.length === 0) {
                tabla.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#555; padding: 40px;">No se encontraron registros.</td></tr>`;
                return;
            }

            notasFiltradas.forEach(item => {
                let esAprobado = item.nota >= 70;
                let estado = esAprobado ? "APROBADO" : "REPROBADO";
                let clase = esAprobado ? "aprobado" : "reprobado";

                tabla.innerHTML += `
                    <tr>
                        <td><strong>${item.materia}</strong></td>
                        <td>${item.nota} / 100</td>
                        <td class="${clase}">${estado}</td>
                        <td style="color: #666; font-size: 13px;">Prof. ${item.maestro}</td>
                    </tr>
                `;
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioRegistrado'); // Opcional: borrar sesión al salir
            window.location.href = "registro.html";
        }
    </script>
</body>

</html>
